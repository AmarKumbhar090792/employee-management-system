services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ems_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  employee-app:
    build: .
    container_name: employee-app
    restart: always

    depends_on:
      mysql-db:
        condition: service_healthy

    ports:
      - "8080:8080"

volumes:
  mysql-data: